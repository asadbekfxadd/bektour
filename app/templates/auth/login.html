{% extends 'base.html' %}
{% block title %}Login — Bek Tour{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--grey-100);">
  <div style="width:100%;max-width:440px;">
    <div style="text-align:center;margin-bottom:32px;">
      <a href="{{ url_for('main.index') }}" class="logo" style="justify-content:center;margin-bottom:16px;">
        <span class="logo-icon">✈</span>
        <span class="logo-text">Bek<span class="logo-accent"> Tour</span></span>
      </a>
      <h1 style="font-size:1.75rem;margin-bottom:6px;">Welcome back</h1>
      <p style="color:var(--grey-500);">Sign in to your account</p>
    </div>
    <div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:36px;">
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
          <label class="form-label">Email</label>
          <div style="position:relative;">
            <input type="email" name="email" class="form-control" required placeholder="your@email.com" style="padding-left:42px;" value="{{ request.form.get('email','') }}">
            <i class="fa fa-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey-500);"></i>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;justify-content:space-between;">
            Password <a href="#" style="color:var(--gold);font-weight:400;font-size:.85rem;">Forgot?</a>
          </label>
          <div style="position:relative;">
            <input type="password" name="password" id="password" class="form-control" required placeholder="••••••••" style="padding-left:42px;padding-right:42px;">
            <i class="fa fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey-500);"></i>
            <button type="button" onclick="togglePass()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--grey-500);">
              <i class="fa fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:24px;">
          <input type="checkbox" name="remember" id="remember" style="width:16px;height:16px;accent-color:var(--gold);">
          <label for="remember" style="font-size:.875rem;cursor:pointer;">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="fa fa-sign-in-alt"></i> Sign In
        </button>
      </form>
      <p style="text-align:center;font-size:.9rem;color:var(--grey-500);margin-top:20px;">
        No account? <a href="{{ url_for('auth.register') }}" style="color:var(--gold);font-weight:600;">Register</a>
      </p>
    </div>
    <p style="text-align:center;margin-top:16px;font-size:.8rem;color:var(--grey-500);">
      Travel agency? <a href="{{ url_for('b2b.register') }}" style="color:var(--gold);">Join B2B</a>
    </p>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePass() {
  const p = document.getElementById('password');
  const i = document.getElementById('eye-icon');
  p.type = p.type === 'password' ? 'text' : 'password';
  i.className = p.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
}
</script>
{% endblock %}
