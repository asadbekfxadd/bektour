{% extends 'base.html' %}
{% block title %}Register — Bek Tour{% endblock %}
{% block content %}
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:var(--grey-100);">
  <div style="width:100%;max-width:480px;">
    <div style="text-align:center;margin-bottom:32px;">
      <a href="{{ url_for('main.index') }}" class="logo" style="justify-content:center;margin-bottom:16px;">
        <span class="logo-icon">✈</span>
        <span class="logo-text">Bek<span class="logo-accent"> Tour</span></span>
      </a>
      <h1 style="font-size:1.75rem;margin-bottom:6px;">Create account</h1>
      <p style="color:var(--grey-500);">Join thousands of luxury travelers</p>
    </div>
    <div style="background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:36px;">
      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">First name *</label>
            <input type="text" name="first_name" class="form-control" required placeholder="John" value="{{ request.form.get('first_name','') }}">
          </div>
          <div class="form-group">
            <label class="form-label">Last name</label>
            <input type="text" name="last_name" class="form-control" placeholder="Doe" value="{{ request.form.get('last_name','') }}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <div style="position:relative;">
            <input type="tel" name="phone" class="form-control" placeholder="+1 234 567 8900" style="padding-left:42px;" value="{{ request.form.get('phone','') }}">
            <i class="fa fa-phone" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey-500);"></i>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email *</label>
          <div style="position:relative;">
            <input type="email" name="email" class="form-control" required placeholder="your@email.com" style="padding-left:42px;" value="{{ request.form.get('email','') }}">
            <i class="fa fa-envelope" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey-500);"></i>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Password *</label>
          <div style="position:relative;">
            <input type="password" name="password" id="password" class="form-control" required placeholder="Min 8 characters" style="padding-left:42px;padding-right:42px;">
            <i class="fa fa-lock" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--grey-500);"></i>
            <button type="button" onclick="togglePass()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--grey-500);">
              <i class="fa fa-eye" id="eye-icon"></i>
            </button>
          </div>
          <div style="display:flex;gap:4px;margin-top:8px;" id="strength-bars">
            <div style="height:4px;flex:1;border-radius:2px;background:var(--grey-100);" class="bar"></div>
            <div style="height:4px;flex:1;border-radius:2px;background:var(--grey-100);" class="bar"></div>
            <div style="height:4px;flex:1;border-radius:2px;background:var(--grey-100);" class="bar"></div>
            <div style="height:4px;flex:1;border-radius:2px;background:var(--grey-100);" class="bar"></div>
          </div>
        </div>
        <div style="margin-bottom:24px;">
          <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
            <input type="checkbox" required style="width:16px;height:16px;margin-top:2px;flex-shrink:0;accent-color:var(--gold);">
            <span style="font-size:.875rem;color:var(--grey-700);">
              I agree to the <a href="#" style="color:var(--gold);">Terms of Service</a> and <a href="#" style="color:var(--gold);">Privacy Policy</a>
            </span>
          </label>
        </div>
        <button type="submit" class="btn btn-gold btn-block btn-lg">
          <i class="fa fa-user-plus"></i> Create Account
        </button>
      </form>
      <p style="text-align:center;font-size:.9rem;color:var(--grey-500);margin-top:20px;">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--gold);font-weight:600;">Sign In</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePass() {
  const p = document.getElementById('password');
  const i = document.getElementById('eye-icon');
  p.type = p.type === 'password' ? 'text' : 'password';
  i.className = p.type === 'password' ? 'fa fa-eye' : 'fa fa-eye-slash';
}
document.getElementById('password').addEventListener('input', function() {
  const val = this.value;
  const bars = document.querySelectorAll('.bar');
  const colors = ['#E53E3E','#F5A623','#C9A84C','#38A169'];
  let score = 0;
  if (val.length >= 6) score++;
  if (val.length >= 10) score++;
  if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  bars.forEach((bar, i) => bar.style.background = i < score ? colors[score-1] : 'var(--grey-100)');
});
</script>
{% endblock %}
